name: Code Quality and Linting

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  quality-check:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Check build output size
      run: |
        npm run build
        du -sh dist/
        echo "Build artifacts size check completed"
      continue-on-error: true
    
    - name: Verify no console errors
      run: |
        if grep -r "console.error" src/ --include="*.jsx" --include="*.js"; then
          echo "Warning: console.error statements found in code"
        else
          echo "No console.error statements found"
        fi
      continue-on-error: true
